<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoVault</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --accent: #ff2d5c;
    --accent2: #7c3aed;
    --text: #f0f0f8;
    --muted: #888899;
    --border: rgba(255,255,255,0.08);
    --card-hover: #1e1e2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* TOP NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 60px;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .nav-count {
    font-size: 0.8rem;
    color: var(--muted);
    background: var(--surface);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* ADD VIDEO BUTTON */
  .add-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.875rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .add-btn:hover { opacity: 0.9; }
  .add-btn:active { transform: scale(0.97); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    margin: 1rem;
    animation: popIn 0.2s ease;
  }
  @keyframes popIn {
    from { opacity:0; transform: scale(0.93); }
    to { opacity:1; transform: scale(1); }
  }
  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
    margin-bottom: 1.5rem;
    color: var(--text);
  }
  .field { margin-bottom: 1rem; }
  .field label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .field input, .field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  .field input:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field textarea { height: 80px; }
  .modal-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
  }
  .btn-cancel {
    flex: 1;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.2s;
  }
  .btn-cancel:hover { background: #252535; }
  .btn-save {
    flex: 2;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    padding: 10px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9rem;
    transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.9; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

  /* FILTERS */
  .filters {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1.25rem 2rem;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-chip {
    white-space: nowrap;
    padding: 6px 16px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.82rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-chip:hover { border-color: rgba(255,45,92,0.4); color: var(--text); }
  .filter-chip.active {
    background: linear-gradient(135deg, rgba(255,45,92,0.2), rgba(124,58,237,0.2));
    border-color: var(--accent);
    color: var(--text);
  }
  .search-wrap {
    margin-left: auto;
    position: relative;
    flex-shrink: 0;
  }
  .search-wrap input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 7px 14px 7px 34px;
    outline: none;
    width: 200px;
    transition: border-color 0.2s, width 0.3s;
  }
  .search-wrap input:focus { border-color: var(--accent); width: 240px; }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
  }

  /* MAIN CONTENT */
  main { padding: 1.5rem 2rem 4rem; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 5rem 2rem;
    display: none;
  }
  .empty-state.show { display: block; }
  .empty-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.3;
  }
  .empty-state h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .empty-state p { color: var(--muted); font-size: 0.9rem; opacity: 0.6; }

  /* VIDEO GRID */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1rem;
  }

  /* VIDEO CARD */
  .video-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
    position: relative;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .video-card:hover { transform: translateY(-3px); border-color: rgba(255,45,92,0.35); }

  /* VIDEO THUMBNAIL */
  .video-thumb {
    position: relative;
    width: 100%;
    aspect-ratio: 9/16;
    background: var(--surface2);
    overflow: hidden;
  }
  .video-thumb video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .thumb-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
    pointer-events: none;
  }
  .play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    width: 48px;
    height: 48px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 18px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .video-card:hover .play-btn { opacity: 1; }

  .video-platform {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 0.7rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.05em;
    pointer-events: none;
  }

  .video-actions {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .video-card:hover .video-actions { opacity: 1; }
  .action-btn {
    width: 32px;
    height: 32px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    border-radius: 8px;
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: background 0.2s;
  }
  .action-btn:hover { background: rgba(255,45,92,0.7); }
  .action-btn.del:hover { background: rgba(220,38,38,0.8); }

  /* CARD INFO */
  .card-info {
    padding: 10px 12px 12px;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .card-date { display: flex; align-items: center; gap: 4px; }

  /* VIDEO MODAL */
  .video-modal-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .video-modal-overlay.open { display: flex; }
  .video-modal {
    position: relative;
    background: var(--surface);
    border-radius: 20px;
    overflow: hidden;
    max-width: 400px;
    width: 100%;
    border: 1px solid var(--border);
    animation: popIn 0.2s ease;
  }
  .video-modal video {
    width: 100%;
    max-height: 70vh;
    object-fit: contain;
    background: #000;
    display: block;
  }
  .video-modal-info {
    padding: 1rem 1.25rem 1.25rem;
  }
  .video-modal-info h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 6px;
  }
  .video-modal-info p {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.5;
  }
  .vm-close {
    position: absolute;
    top: 12px; right: 12px;
    width: 36px; height: 36px;
    background: rgba(0,0,0,0.7);
    border: none;
    border-radius: 50%;
    color: #fff;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 0.875rem;
    color: var(--text);
    z-index: 500;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(16,185,129,0.5); }
  .toast.error { border-color: rgba(255,45,92,0.5); }

  /* LOADING */
  .loading-state {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 1.5rem;
    padding: 0.75rem 2rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--muted);
  }
  .stat-item strong {
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
  }

  @media (max-width: 600px) {
    nav { padding: 0 1rem; }
    main { padding: 1rem 1rem 4rem; }
    .filters { padding: 1rem; }
    .stats-bar { padding: 0.75rem 1rem; }
    .video-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    .search-wrap { display: none; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">▶ VideoVault</div>
  <div class="nav-right">
    <span class="nav-count" id="nav-count">0 video</span>
    <button class="add-btn" onclick="openAddModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Lưu video
    </button>
  </div>
</nav>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-item">Tổng: <strong id="total-count">0</strong></div>
  <div class="stat-item">TikTok: <strong id="tt-count">0</strong></div>
  <div class="stat-item">YouTube: <strong id="yt-count">0</strong></div>
  <div class="stat-item">Khác: <strong id="other-count">0</strong></div>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="filter-chip active" onclick="setFilter('all', this)">🎬 Tất cả</div>
  <div class="filter-chip" onclick="setFilter('tiktok', this)">📱 TikTok</div>
  <div class="filter-chip" onclick="setFilter('youtube', this)">▶ YouTube</div>
  <div class="filter-chip" onclick="setFilter('facebook', this)">👥 Facebook</div>
  <div class="filter-chip" onclick="setFilter('instagram', this)">📸 Instagram</div>
  <div class="filter-chip" onclick="setFilter('other', this)">🌐 Khác</div>
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" placeholder="Tìm kiếm..." oninput="searchVideos(this.value)" />
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="loading-state" id="loading">
    <span class="spinner"></span>Đang tải từ Firebase...
  </div>
  <div class="empty-state" id="empty">
    <div class="empty-icon">📭</div>
    <h3>Chưa có video nào</h3>
    <p>Nhấn "Lưu video" để thêm link video đầu tiên</p>
  </div>
  <div class="video-grid" id="video-grid"></div>
</main>

<!-- ADD VIDEO MODAL -->
<div class="modal-overlay" id="add-modal" onclick="closeAddModal(event)">
  <div class="modal">
    <h2>🔗 Lưu video mới</h2>
    <div class="field">
      <label>Link video *</label>
      <input type="url" id="input-url" placeholder="https://www.tiktok.com/..." oninput="detectPlatform(this.value)" />
    </div>
    <div class="field">
      <label>Tiêu đề</label>
      <input type="text" id="input-title" placeholder="Nhập tiêu đề video..." />
    </div>
    <div class="field">
      <label>Ghi chú</label>
      <textarea id="input-note" placeholder="Mô tả, hashtag..."></textarea>
    </div>
    <div class="field">
      <label>Nền tảng</label>
      <input type="text" id="input-platform" placeholder="TikTok / YouTube / Facebook..." />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Hủy</button>
      <button class="btn-save" id="save-btn" onclick="saveVideo()">
        <span id="save-text">💾 Lưu video</span>
      </button>
    </div>
  </div>
</div>

<!-- VIEW VIDEO MODAL -->
<div class="video-modal-overlay" id="view-modal" onclick="closeViewModal(event)">
  <div class="video-modal" id="view-modal-inner">
    <button class="vm-close" onclick="closeViewModal()">✕</button>
    <video id="modal-video" controls autoplay></video>
    <div class="video-modal-info">
      <h3 id="modal-title"></h3>
      <p id="modal-note"></p>
      <p style="margin-top:8px">
        <a id="modal-link" href="#" target="_blank" style="color:var(--accent);font-size:0.8rem;text-decoration:none;">🔗 Mở link gốc →</a>
      </p>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FIREBASE + APP SCRIPT -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-G3BfucCstuMlQDKDsQVu3daQ854tuCQ",
    authDomain: "csdl-login.firebaseapp.com",
    databaseURL: "https://csdl-login-default-rtdb.firebaseio.com",
    projectId: "csdl-login",
    storageBucket: "csdl-login.firebasestorage.app",
    messagingSenderId: "1036020118468",
    appId: "1:1036020118468:web:d506f525cdea35f6986a91",
    measurementId: "G-FYQ3XS4EE9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const videosRef = ref(db, 'videos');

  let allVideos = [];
  let currentFilter = 'all';
  let searchQuery = '';

  // ——— LOAD VIDEOS ———
  onValue(videosRef, (snapshot) => {
    allVideos = [];
    if (snapshot.exists()) {
      snapshot.forEach(child => {
        allVideos.push({ id: child.key, ...child.val() });
      });
      allVideos.reverse();
    }
    document.getElementById('loading').style.display = 'none';
    renderVideos();
    updateStats();
  });

  // ——— RENDER ———
  window.renderVideos = function() {
    const grid = document.getElementById('video-grid');
    let filtered = allVideos;
    if (currentFilter !== 'all') {
      filtered = filtered.filter(v => (v.platform || '').toLowerCase().includes(currentFilter));
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(v =>
        (v.title || '').toLowerCase().includes(q) ||
        (v.url || '').toLowerCase().includes(q) ||
        (v.note || '').toLowerCase().includes(q)
      );
    }
    const empty = document.getElementById('empty');
    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.classList.add('show');
    } else {
      empty.classList.remove('show');
      grid.innerHTML = filtered.map((v, i) => buildCard(v, i)).join('');
    }
    document.getElementById('nav-count').textContent = allVideos.length + ' video';
  }

  function buildCard(v, i) {
    const platform = v.platform || 'Video';
    const title = v.title || shortenUrl(v.url);
    const date = v.createdAt ? new Date(v.createdAt).toLocaleDateString('vi-VN') : '';
    const embedUrl = getEmbedUrl(v.url);
    const thumb = getThumbnail(v.url, v.platform);

    return `<div class="video-card" style="animation-delay:${i*40}ms" onclick="openVideo('${escHtml(v.url)}', '${escHtml(title)}', '${escHtml(v.note||'')}')">
      <div class="video-thumb">
        ${thumb
          ? `<img src="${thumb}" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy" onerror="this.style.display='none'">`
          : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.15);font-size:2.5rem;">▶</div>`
        }
        <div class="thumb-overlay"></div>
        <div class="play-btn">▶</div>
        <div class="video-platform">${platform}</div>
        <div class="video-actions">
          <button class="action-btn" title="Mở link" onclick="event.stopPropagation();window.open('${escHtml(v.url)}','_blank')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </button>
          <button class="action-btn del" title="Xóa" onclick="event.stopPropagation();deleteVideo('${v.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          </button>
        </div>
      </div>
      <div class="card-info">
        <div class="card-title" title="${escHtml(title)}">${escHtml(title)}</div>
        <div class="card-meta">
          <span>${escHtml(v.note ? v.note.substring(0,30)+(v.note.length>30?'…':'') : '')}</span>
          <span class="card-date">${date}</span>
        </div>
      </div>
    </div>`;
  }

  function updateStats() {
    const total = allVideos.length;
    const tt = allVideos.filter(v => (v.platform||'').toLowerCase().includes('tiktok')).length;
    const yt = allVideos.filter(v => (v.platform||'').toLowerCase().includes('youtube')).length;
    document.getElementById('total-count').textContent = total;
    document.getElementById('tt-count').textContent = tt;
    document.getElementById('yt-count').textContent = yt;
    document.getElementById('other-count').textContent = total - tt - yt;
  }

  // ——— SAVE ———
  window.saveVideo = async function() {
    const url = document.getElementById('input-url').value.trim();
    const title = document.getElementById('input-title').value.trim();
    const note = document.getElementById('input-note').value.trim();
    const platform = document.getElementById('input-platform').value.trim();
    if (!url) { showToast('Vui lòng nhập link video', 'error'); return; }
    try {
      new URL(url);
    } catch {
      showToast('Link không hợp lệ', 'error'); return;
    }
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    document.getElementById('save-text').textContent = 'Đang lưu...';
    try {
      await push(videosRef, {
        url, title: title || shortenUrl(url), note, platform: platform || detectPlatformName(url),
        createdAt: Date.now()
      });
      showToast('✅ Đã lưu video!', 'success');
      closeAddModal();
      document.getElementById('input-url').value = '';
      document.getElementById('input-title').value = '';
      document.getElementById('input-note').value = '';
      document.getElementById('input-platform').value = '';
    } catch(e) {
      showToast('❌ Lỗi: ' + e.message, 'error');
    }
    btn.disabled = false;
    document.getElementById('save-text').textContent = '💾 Lưu video';
  }

  // ——— DELETE ———
  window.deleteVideo = async function(id) {
    if (!confirm('Xóa video này?')) return;
    try {
      await remove(ref(db, 'videos/' + id));
      showToast('🗑 Đã xóa', 'success');
    } catch(e) {
      showToast('Lỗi xóa: ' + e.message, 'error');
    }
  }

  // ——— OPEN VIDEO ———
  window.openVideo = function(url, title, note) {
    const embed = getEmbedUrl(url);
    const modal = document.getElementById('view-modal');
    const video = document.getElementById('modal-video');
    const modalInner = document.getElementById('view-modal-inner');
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-note').textContent = note;
    document.getElementById('modal-link').href = url;
    if (embed) {
      video.src = embed;
      video.style.display = 'block';
      video.play().catch(()=>{});
    } else {
      video.src = url;
      video.style.display = 'block';
    }
    modal.classList.add('open');
  }

  window.closeViewModal = function(e) {
    if (e && e.target !== document.getElementById('view-modal')) return;
    if (!e) {
      const video = document.getElementById('modal-video');
      video.pause(); video.src = '';
      document.getElementById('view-modal').classList.remove('open');
    } else {
      const video = document.getElementById('modal-video');
      video.pause(); video.src = '';
      document.getElementById('view-modal').classList.remove('open');
    }
  }

  // ——— HELPERS ———
  function getEmbedUrl(url) {
    if (!url) return null;
    if (url.includes('tiktok.com')) return null;
    if (url.includes('youtube.com/watch')) {
      const vid = new URL(url).searchParams.get('v');
      return vid ? `https://www.youtube.com/embed/${vid}?autoplay=1` : null;
    }
    if (url.includes('youtu.be/')) {
      const vid = url.split('youtu.be/')[1]?.split('?')[0];
      return vid ? `https://www.youtube.com/embed/${vid}?autoplay=1` : null;
    }
    if (url.match(/\.(mp4|webm|ogg|mov)(\?|$)/i)) return url;
    return null;
  }

  function getThumbnail(url, platform) {
    if (!url) return null;
    if (url.includes('youtube.com/watch')) {
      try {
        const vid = new URL(url).searchParams.get('v');
        return vid ? `https://img.youtube.com/vi/${vid}/hqdefault.jpg` : null;
      } catch { return null; }
    }
    if (url.includes('youtu.be/')) {
      const vid = url.split('youtu.be/')[1]?.split('?')[0];
      return vid ? `https://img.youtube.com/vi/${vid}/hqdefault.jpg` : null;
    }
    return null;
  }

  function detectPlatformName(url) {
    if (!url) return 'Video';
    if (url.includes('tiktok.com')) return 'TikTok';
    if (url.includes('youtube.com') || url.includes('youtu.be')) return 'YouTube';
    if (url.includes('facebook.com') || url.includes('fb.com')) return 'Facebook';
    if (url.includes('instagram.com')) return 'Instagram';
    if (url.includes('twitter.com') || url.includes('x.com')) return 'Twitter/X';
    return 'Video';
  }

  window.detectPlatform = function(url) {
    document.getElementById('input-platform').value = detectPlatformName(url);
  }

  function shortenUrl(url) {
    try {
      const u = new URL(url);
      return u.hostname.replace('www.','') + u.pathname.substring(0,30);
    } catch { return url.substring(0,40); }
  }

  function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ——— FILTER / SEARCH ———
  window.setFilter = function(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderVideos();
  }

  window.searchVideos = function(q) {
    searchQuery = q;
    renderVideos();
  }

  // ——— MODAL CONTROLS ———
  window.openAddModal = function() {
    document.getElementById('add-modal').classList.add('open');
    setTimeout(() => document.getElementById('input-url').focus(), 200);
  }

  window.closeAddModal = function(e) {
    if (e && e.target !== document.getElementById('add-modal')) return;
    document.getElementById('add-modal').classList.remove('open');
  }

  // ——— TOAST ———
  window.showToast = function(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 2800);
  }

  // ——— KEYBOARD ———
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.getElementById('add-modal').classList.remove('open');
      const v = document.getElementById('modal-video');
      v.pause(); v.src = '';
      document.getElementById('view-modal').classList.remove('open');
    }
  });
</script>
</body>
</html>
