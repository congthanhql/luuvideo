<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoVault</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --accent: #ff2d5c;
    --accent2: #7c3aed;
    --text: #f0f0f8;
    --muted: #888899;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.88); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 60px;
  }
  .logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .nav-right { display: flex; align-items: center; gap: 0.75rem; }
  .nav-count { font-size: 0.8rem; color: var(--muted); background: var(--surface); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); }
  .add-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; padding: 8px 18px; border-radius: 20px;
    font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.875rem;
    cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.2s;
  }
  .add-btn:hover { opacity: 0.88; }

  .stats-bar { display: flex; gap: 1.5rem; padding: 0.75rem 2rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; color: var(--muted); }
  .stat-item strong { color: var(--text); font-family: 'Syne', sans-serif; font-weight: 700; }

  .filters { display: flex; align-items: center; gap: 0.75rem; padding: 1rem 2rem; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
  .filters::-webkit-scrollbar { display: none; }
  .filter-chip { white-space: nowrap; padding: 6px 16px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
  .filter-chip:hover { border-color: rgba(255,45,92,0.4); color: var(--text); }
  .filter-chip.active { background: linear-gradient(135deg, rgba(255,45,92,0.2), rgba(124,58,237,0.2)); border-color: var(--accent); color: var(--text); }
  .search-wrap { margin-left: auto; position: relative; flex-shrink: 0; }
  .search-wrap input { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; padding: 7px 14px 7px 34px; outline: none; width: 200px; transition: border-color 0.2s, width 0.3s; }
  .search-wrap input:focus { border-color: var(--accent); width: 240px; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

  main { padding: 1.5rem 2rem 4rem; }

  .loading-state { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 5rem 2rem; display: none; }
  .empty-state.show { display: block; }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }
  .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 1.2rem; color: var(--muted); margin-bottom: 0.5rem; }
  .empty-state p { color: var(--muted); font-size: 0.9rem; opacity: 0.6; }

  .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }

  .video-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s; position: relative; animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  .video-card:hover { transform: translateY(-3px); border-color: rgba(255,45,92,0.35); }

  .video-thumb { position: relative; width: 100%; aspect-ratio: 9/16; background: var(--surface2); overflow: hidden; }
  .video-thumb img, .video-thumb video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%); pointer-events: none; }
  .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 48px; height: 48px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
  .video-card:hover .play-btn { opacity: 1; }
  .video-platform { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); border-radius: 8px; padding: 3px 8px; font-size: 0.68rem; font-weight: 600; color: #fff; pointer-events: none; }
  .video-type-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(124,58,237,0.8); border-radius: 6px; padding: 2px 7px; font-size: 0.65rem; font-weight: 600; color: #fff; pointer-events: none; }

  .video-actions { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 6px; opacity: 0; transition: opacity 0.2s; }
  .video-card:hover .video-actions { opacity: 1; }
  .action-btn { width: 32px; height: 32px; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); border-radius: 8px; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: background 0.2s; }
  .action-btn:hover { background: rgba(255,45,92,0.7); }
  .action-btn.del:hover { background: rgba(220,38,38,0.8); }

  .card-info { padding: 10px 12px 12px; }
  .card-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.88rem; color: var(--text); line-height: 1.3; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { display: flex; align-items: center; justify-content: space-between; font-size: 0.72rem; color: var(--muted); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; width: 100%; max-width: 500px; margin: 1rem; animation: popIn 0.2s ease; max-height: 90vh; overflow-y: auto; }
  @keyframes popIn { from { opacity:0; transform: scale(0.93); } to { opacity:1; transform: scale(1); } }
  .modal h2 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; margin-bottom: 1.5rem; }

  /* TABS */
  .tab-row { display: flex; gap: 0; margin-bottom: 1.5rem; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .tab-btn { flex: 1; padding: 9px; background: transparent; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
  .tab-btn.active { background: linear-gradient(135deg, rgba(255,45,92,0.25), rgba(124,58,237,0.25)); color: var(--text); font-weight: 500; }
  .tab-btn:not(:last-child) { border-right: 1px solid var(--border); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .field input, .field textarea, .field select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 10px 14px; outline: none; transition: border-color 0.2s; resize: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field textarea { height: 72px; }
  .field select option { background: #1c1c26; }

  /* FILE DROP ZONE */
  .drop-zone {
    border: 2px dashed var(--border); border-radius: 12px; padding: 2rem 1rem;
    text-align: center; cursor: pointer; transition: all 0.2s; position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(255,45,92,0.05); }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .drop-label { font-size: 0.9rem; color: var(--muted); }
  .drop-label span { color: var(--accent); }
  .drop-info { font-size: 0.75rem; color: var(--muted); margin-top: 4px; opacity: 0.7; }
  .file-selected { font-size: 0.82rem; color: #10b981; margin-top: 8px; font-weight: 500; }

  /* PROGRESS */
  .progress-wrap { margin-top: 0.75rem; display: none; }
  .progress-wrap.show { display: block; }
  .progress-bar-bg { background: var(--surface2); border-radius: 6px; height: 6px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 6px; transition: width 0.2s; width: 0%; }
  .progress-text { font-size: 0.78rem; color: var(--muted); margin-top: 4px; text-align: center; }

  .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
  .btn-cancel { flex: 1; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); padding: 10px; border-radius: 10px; font-family: 'DM Sans', sans-serif; cursor: pointer; font-size: 0.9rem; transition: background 0.2s; }
  .btn-cancel:hover { background: #252535; }
  .btn-save { flex: 2; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; padding: 10px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: opacity 0.2s; }
  .btn-save:hover { opacity: 0.9; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

  /* VIDEO VIEWER MODAL */
  .view-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.93); display: none; align-items: center; justify-content: center; padding: 1rem; }
  .view-overlay.open { display: flex; }
  .view-modal { position: relative; background: var(--surface); border-radius: 20px; overflow: hidden; max-width: 420px; width: 100%; border: 1px solid var(--border); animation: popIn 0.2s ease; }
  .view-modal video, .view-modal iframe { width: 100%; display: block; background: #000; }
  .view-modal video { max-height: 72vh; object-fit: contain; }
  .view-modal iframe { height: 72vh; border: none; }
  .view-info { padding: 1rem 1.25rem 1.25rem; }
  .view-info h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
  .view-info p { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
  .vm-close { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; background: rgba(0,0,0,0.7); border: none; border-radius: 50%; color: #fff; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; z-index: 10; }

  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; font-size: 0.875rem; color: var(--text); z-index: 500; transition: transform 0.3s ease; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(16,185,129,0.5); }
  .toast.error { border-color: rgba(255,45,92,0.5); }

  @media (max-width: 600px) {
    nav { padding: 0 1rem; }
    main { padding: 1rem 1rem 4rem; }
    .filters, .stats-bar { padding: 0.75rem 1rem; }
    .video-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    .search-wrap { display: none; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">▶ VideoVault</div>
  <div class="nav-right">
    <span class="nav-count" id="nav-count">0 video</span>
    <button class="add-btn" onclick="openAddModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Thêm video
    </button>
  </div>
</nav>

<div class="stats-bar">
  <div class="stat-item">Tổng: <strong id="total-count">0</strong></div>
  <div class="stat-item">Upload: <strong id="upload-count">0</strong></div>
  <div class="stat-item">Link: <strong id="link-count">0</strong></div>
</div>

<div class="filters">
  <div class="filter-chip active" onclick="setFilter('all',this)">🎬 Tất cả</div>
  <div class="filter-chip" onclick="setFilter('upload',this)">📤 Đã upload</div>
  <div class="filter-chip" onclick="setFilter('tiktok',this)">📱 TikTok</div>
  <div class="filter-chip" onclick="setFilter('youtube',this)">▶ YouTube</div>
  <div class="filter-chip" onclick="setFilter('facebook',this)">👥 Facebook</div>
  <div class="filter-chip" onclick="setFilter('other',this)">🌐 Khác</div>
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" placeholder="Tìm kiếm..." oninput="searchVideos(this.value)" />
  </div>
</div>

<main>
  <div class="loading-state" id="loading"><span class="spinner"></span>Đang tải từ Firebase...</div>
  <div class="empty-state" id="empty">
    <div class="empty-icon">📭</div>
    <h3>Chưa có video nào</h3>
    <p>Nhấn "Thêm video" để upload hoặc lưu link</p>
  </div>
  <div class="video-grid" id="video-grid"></div>
</main>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal" onclick="handleModalClick(event,'add-modal')">
  <div class="modal">
    <h2>🎬 Thêm video mới</h2>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('upload',this)">📤 Upload file</button>
      <button class="tab-btn" onclick="switchTab('link',this)">🔗 Lưu link</button>
    </div>

    <!-- UPLOAD TAB -->
    <div class="tab-content active" id="tab-upload">
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept="video/*" onchange="onFileSelected(this)" />
        <div class="drop-icon">🎥</div>
        <div class="drop-label">Kéo thả hoặc <span>chọn file video</span></div>
        <div class="drop-info">MP4, MOV, AVI, WEBM — tối đa 500MB</div>
        <div class="file-selected" id="file-name"></div>
      </div>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
        <div class="progress-text" id="progress-text">0%</div>
      </div>
      <div class="field" style="margin-top:1rem">
        <label>Tiêu đề</label>
        <input type="text" id="upload-title" placeholder="Tên video..." />
      </div>
      <div class="field">
        <label>Ghi chú</label>
        <textarea id="upload-note" placeholder="Mô tả, hashtag..."></textarea>
      </div>
    </div>

    <!-- LINK TAB -->
    <div class="tab-content" id="tab-link">
      <div class="field">
        <label>Link video *</label>
        <input type="url" id="link-url" placeholder="https://www.tiktok.com/..." oninput="detectPlatform(this.value)" />
      </div>
      <div class="field">
        <label>Tiêu đề</label>
        <input type="text" id="link-title" placeholder="Tên video..." />
      </div>
      <div class="field">
        <label>Ghi chú</label>
        <textarea id="link-note" placeholder="Mô tả, hashtag..."></textarea>
      </div>
      <div class="field">
        <label>Nền tảng</label>
        <input type="text" id="link-platform" placeholder="TikTok / YouTube / Facebook..." />
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('add-modal')">Hủy</button>
      <button class="btn-save" id="save-btn" onclick="saveVideo()">
        <span id="save-text">💾 Lưu</span>
      </button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="view-overlay" id="view-modal" onclick="handleModalClick(event,'view-modal')">
  <div class="view-modal" id="view-modal-inner">
    <button class="vm-close" onclick="closeViewModal()">✕</button>
    <div id="view-player"></div>
    <div class="view-info">
      <h3 id="view-title"></h3>
      <p id="view-note"></p>
      <p style="margin-top:8px"><a id="view-link" href="#" target="_blank" style="color:var(--accent);font-size:0.8rem;text-decoration:none;">🔗 Mở link gốc →</a></p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref as dbRef, push, onValue, remove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
import { getStorage, ref as stRef, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbW8R2HapkKQWgiIB8VqxI2o2TRrKwJK8",
  authDomain: "rule-f6b84.firebaseapp.com",
  databaseURL: "https://rule-f6b84-default-rtdb.firebaseio.com",
  projectId: "rule-f6b84",
  storageBucket: "rule-f6b84.firebasestorage.app",
  messagingSenderId: "914382101341",
  appId: "1:914382101341:web:2dcc836a28df58aec266b4",
  measurementId: "G-C9H49N0F96"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);
const videosRef = dbRef(db, 'videos');

let allVideos = [];
let currentFilter = 'all';
let searchQuery = '';
let activeTab = 'upload';
let selectedFile = null;

// ——— LOAD ———
onValue(videosRef, snap => {
  allVideos = [];
  if (snap.exists()) {
    snap.forEach(c => allVideos.push({ id: c.key, ...c.val() }));
    allVideos.reverse();
  }
  document.getElementById('loading').style.display = 'none';
  renderVideos();
  updateStats();
});

// ——— RENDER ———
window.renderVideos = function() {
  const grid = document.getElementById('video-grid');
  let list = allVideos;
  if (currentFilter === 'upload') {
    list = list.filter(v => v.type === 'upload');
  } else if (currentFilter !== 'all') {
    list = list.filter(v => (v.platform || '').toLowerCase().includes(currentFilter));
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(v => (v.title||'').toLowerCase().includes(q) || (v.url||'').toLowerCase().includes(q) || (v.note||'').toLowerCase().includes(q));
  }
  const empty = document.getElementById('empty');
  if (!list.length) { grid.innerHTML = ''; empty.classList.add('show'); return; }
  empty.classList.remove('show');
  grid.innerHTML = list.map((v,i) => buildCard(v,i)).join('');
}

function buildCard(v, i) {
  const title = esc(v.title || shortenUrl(v.url || ''));
  const platform = esc(v.platform || (v.type==='upload' ? 'Upload' : 'Video'));
  const date = v.createdAt ? new Date(v.createdAt).toLocaleDateString('vi-VN') : '';
  const thumb = v.thumbnail || getYtThumb(v.url || '');
  const isUpload = v.type === 'upload';

  return `<div class="video-card" style="animation-delay:${i*35}ms" onclick="openVideo('${esc(v.id)}')">
    <div class="video-thumb">
      ${thumb
        ? `<img src="${thumb}" loading="lazy" onerror="this.style.display='none'">`
        : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.12);font-size:2.5rem;">▶</div>`}
      <div class="thumb-overlay"></div>
      <div class="play-btn">▶</div>
      <div class="video-platform">${platform}</div>
      ${isUpload ? `<div class="video-type-badge">📤 file</div>` : ''}
      <div class="video-actions">
        <button class="action-btn" title="Mở link" onclick="event.stopPropagation();window.open('${esc(v.url||v.storageUrl||'')}','_blank')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
        <button class="action-btn del" title="Xóa" onclick="event.stopPropagation();deleteVideo('${v.id}','${esc(v.storagePath||'')}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>
    <div class="card-info">
      <div class="card-title" title="${title}">${title}</div>
      <div class="card-meta">
        <span>${esc((v.note||'').substring(0,28))}</span>
        <span>${date}</span>
      </div>
    </div>
  </div>`;
}

function updateStats() {
  const total = allVideos.length;
  const uploads = allVideos.filter(v => v.type === 'upload').length;
  document.getElementById('total-count').textContent = total;
  document.getElementById('upload-count').textContent = uploads;
  document.getElementById('link-count').textContent = total - uploads;
  document.getElementById('nav-count').textContent = total + ' video';
}

// ——— SAVE ———
window.saveVideo = async function() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;

  if (activeTab === 'upload') {
    if (!selectedFile) { toast('Vui lòng chọn file video', 'error'); btn.disabled = false; return; }
    const title = document.getElementById('upload-title').value.trim() || selectedFile.name.replace(/\.[^.]+$/, '');
    const note = document.getElementById('upload-note').value.trim();
    const storagePath = `videos/${Date.now()}_${selectedFile.name}`;
    const storageRef = stRef(storage, storagePath);
    const task = uploadBytesResumable(storageRef, selectedFile);
    document.getElementById('save-text').textContent = 'Đang upload...';
    document.getElementById('progress-wrap').classList.add('show');

    task.on('state_changed',
      snap => {
        const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-text').textContent = pct + '%';
      },
      err => {
        toast('❌ Upload lỗi: ' + err.message, 'error');
        btn.disabled = false;
        document.getElementById('save-text').textContent = '💾 Lưu';
      },
      async () => {
        const url = await getDownloadURL(task.snapshot.ref);
        await push(videosRef, { type: 'upload', title, note, platform: 'Upload', url, storagePath, createdAt: Date.now() });
        toast('✅ Upload thành công!', 'success');
        closeModal('add-modal');
        resetForm();
        btn.disabled = false;
        document.getElementById('save-text').textContent = '💾 Lưu';
      }
    );
  } else {
    const url = document.getElementById('link-url').value.trim();
    if (!url) { toast('Vui lòng nhập link', 'error'); btn.disabled = false; return; }
    try { new URL(url); } catch { toast('Link không hợp lệ', 'error'); btn.disabled = false; return; }
    const title = document.getElementById('link-title').value.trim() || shortenUrl(url);
    const note = document.getElementById('link-note').value.trim();
    const platform = document.getElementById('link-platform').value.trim() || detectPlatformName(url);
    document.getElementById('save-text').textContent = 'Đang lưu...';
    try {
      await push(videosRef, { type: 'link', title, note, platform, url, createdAt: Date.now() });
      toast('✅ Đã lưu link!', 'success');
      closeModal('add-modal');
      resetForm();
    } catch(e) { toast('❌ Lỗi: ' + e.message, 'error'); }
    btn.disabled = false;
    document.getElementById('save-text').textContent = '💾 Lưu';
  }
}

// ——— DELETE ———
window.deleteVideo = async function(id, storagePath) {
  if (!confirm('Xóa video này?')) return;
  try {
    await remove(dbRef(db, 'videos/' + id));
    if (storagePath) {
      try { await deleteObject(stRef(storage, storagePath)); } catch {}
    }
    toast('🗑 Đã xóa', 'success');
  } catch(e) { toast('Lỗi: ' + e.message, 'error'); }
}

// ——— OPEN VIDEO ———
window.openVideo = function(id) {
  const v = allVideos.find(x => x.id === id);
  if (!v) return;
  const player = document.getElementById('view-player');
  const videoUrl = v.url || v.storageUrl || '';
  const embed = getEmbedUrl(videoUrl);

  if (embed) {
    player.innerHTML = `<iframe src="${embed}" allowfullscreen allow="autoplay"></iframe>`;
  } else {
    player.innerHTML = `<video src="${videoUrl}" controls autoplay style="max-height:72vh;object-fit:contain;width:100%;background:#000;display:block;"></video>`;
  }

  document.getElementById('view-title').textContent = v.title || '';
  document.getElementById('view-note').textContent = v.note || '';
  document.getElementById('view-link').href = videoUrl;
  document.getElementById('view-link').style.display = videoUrl ? 'inline' : 'none';
  document.getElementById('view-modal').classList.add('open');
}

window.closeViewModal = function() {
  document.getElementById('view-player').innerHTML = '';
  document.getElementById('view-modal').classList.remove('open');
}

// ——— HELPERS ———
function getEmbedUrl(url) {
  if (!url) return null;
  if (url.includes('youtube.com/watch')) {
    try { const v = new URL(url).searchParams.get('v'); return v ? `https://www.youtube.com/embed/${v}?autoplay=1` : null; } catch { return null; }
  }
  if (url.includes('youtu.be/')) {
    const v = url.split('youtu.be/')[1]?.split('?')[0];
    return v ? `https://www.youtube.com/embed/${v}?autoplay=1` : null;
  }
  return null;
}
function getYtThumb(url) {
  if (!url) return null;
  if (url.includes('youtube.com/watch')) { try { const v = new URL(url).searchParams.get('v'); return v ? `https://img.youtube.com/vi/${v}/hqdefault.jpg` : null; } catch { return null; } }
  if (url.includes('youtu.be/')) { const v = url.split('youtu.be/')[1]?.split('?')[0]; return v ? `https://img.youtube.com/vi/${v}/hqdefault.jpg` : null; }
  return null;
}
function detectPlatformName(url) {
  if (!url) return 'Video';
  if (url.includes('tiktok.com')) return 'TikTok';
  if (url.includes('youtube.com') || url.includes('youtu.be')) return 'YouTube';
  if (url.includes('facebook.com') || url.includes('fb.com')) return 'Facebook';
  if (url.includes('instagram.com')) return 'Instagram';
  if (url.includes('twitter.com') || url.includes('x.com')) return 'Twitter/X';
  return 'Video';
}
window.detectPlatform = function(url) {
  document.getElementById('link-platform').value = detectPlatformName(url);
}
function shortenUrl(url) {
  try { const u = new URL(url); return u.hostname.replace('www.','') + u.pathname.substring(0,25); } catch { return url.substring(0,40); }
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ——— FILE SELECT ———
window.onFileSelected = function(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 500 * 1024 * 1024) { toast('File quá lớn (tối đa 500MB)', 'error'); return; }
  selectedFile = file;
  document.getElementById('file-name').textContent = '✅ ' + file.name + ' (' + (file.size/1024/1024).toFixed(1) + ' MB)';
  if (!document.getElementById('upload-title').value) {
    document.getElementById('upload-title').value = file.name.replace(/\.[^.]+$/, '');
  }
}

// Drag & drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('video/')) {
    const dt = new DataTransfer(); dt.items.add(file);
    document.getElementById('file-input').files = dt.files;
    onFileSelected(document.getElementById('file-input'));
  }
});

// ——— TABS ———
window.switchTab = function(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-upload').classList.toggle('active', tab === 'upload');
  document.getElementById('tab-link').classList.toggle('active', tab === 'link');
}

// ——— MODAL / FILTER / SEARCH ———
window.openAddModal = function() {
  document.getElementById('add-modal').classList.add('open');
}
window.closeModal = function(id) {
  document.getElementById(id).classList.remove('open');
}
window.handleModalClick = function(e, id) {
  if (e.target === document.getElementById(id)) {
    if (id === 'view-modal') closeViewModal();
    else closeModal(id);
  }
}
function resetForm() {
  selectedFile = null;
  document.getElementById('file-name').textContent = '';
  document.getElementById('file-input').value = '';
  document.getElementById('upload-title').value = '';
  document.getElementById('upload-note').value = '';
  document.getElementById('link-url').value = '';
  document.getElementById('link-title').value = '';
  document.getElementById('link-note').value = '';
  document.getElementById('link-platform').value = '';
  document.getElementById('progress-wrap').classList.remove('show');
  document.getElementById('progress-fill').style.width = '0%';
}
window.setFilter = function(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderVideos();
}
window.searchVideos = function(q) { searchQuery = q; renderVideos(); }

function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}
window.toast = toast;

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal('add-modal'); closeViewModal(); }
});
</script>
