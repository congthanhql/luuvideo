<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
push,
onValue,
remove
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbW8R2HapkKQWgiIB8VqxI2o2TRrKwJK8",
  authDomain: "rule-f6b84.firebaseapp.com",
  databaseURL: "https://rule-f6b84-default-rtdb.firebaseio.com",
  projectId: "rule-f6b84",
  storageBucket: "rule-f6b84.firebasestorage.app",
  messagingSenderId: "914382101341",
  appId: "1:914382101341:web:2dcc836a28df58aec266b4",
  measurementId: "G-C9H49N0F96"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.addVideo = function(){

const title =
document.getElementById("title").value.trim();

const url =
document.getElementById("url").value.trim();

if(!title || !url){
alert("Vui lòng nhập đầy đủ!");
return;
}

push(ref(db,"videos"),{
title:title,
url:url,
createdAt:Date.now()
});

document.getElementById("title").value="";
document.getElementById("url").value="";
}

window.deleteVideo = function(id){

if(confirm("Xóa video này?")){
remove(ref(db,"videos/"+id));
}

}

function loadVideos(){

onValue(ref(db,"videos"),(snapshot)=>{

const data = snapshot.val() || {};

const videos = Object.entries(data)
.map(([id,value])=>({
id,
...value
}))
.sort((a,b)=>b.createdAt-a.createdAt);

renderVideos(videos);

});

}

window.renderVideos = function(videos=[]){

const search =
document.getElementById("search")
.value.toLowerCase();

const container =
document.getElementById("videoList");

const filtered =
videos.filter(v=>
v.title.toLowerCase().includes(search)
);

if(filtered.length===0){

container.innerHTML=`
<div class="empty">
<h3>📭 Chưa có video nào</h3>
</div>
`;

return;
}

container.innerHTML =
filtered.map(v=>`

<div class="card">

<div class="preview">
🎥
</div>

<div class="info">

<div class="title">
${v.title}
</div>

<div class="link">
${v.url}
</div>

<div class="actions">

<button
class="open"
onclick="window.open('${v.url}','_blank')">
▶ Xem
</button>

<button
class="delete"
onclick="deleteVideo('${v.id}')">
🗑
</button>

</div>

</div>

</div>

`).join("");

};

document
.getElementById("search")
.addEventListener("keyup",()=>loadVideos());

loadVideos();

</script>
